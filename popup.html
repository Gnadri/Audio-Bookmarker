<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioBookmark</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icons/logo.png" alt="Logo" style="height: 24px; width: 24px;" />
        <h1>AudioBookmark</h1>
      </div>
    </header>

    <main>
      <!-- View when page is NOT in library -->
      <div id="not-in-library-view">
        <button id="addCurrentPage" class="action-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Bookmark Current Page
        </button>

        <div id="status-message" class="status hidden">Saved!</div>

        <button id="openDashboard" class="secondary-btn">
          Open Library
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </button>
      </div>

      <!-- View when page IS in library -->
      <div id="in-library-view" class="hidden">
        <!-- View Mode -->
        <div id="view-mode">
          <div class="book-card">
            <div class="book-info-row">
              <img id="current-book-cover" src="icons/icon128.png" class="book-cover-thumb" alt="Cover" />
              <div class="book-text-info">
                <h3 id="current-book-title" class="book-title-text"></h3>
                <p id="current-book-author" class="book-author-text"></p>
              </div>
            </div>
            
            <div class="timestamp-section">
              <label for="bookmark-timestamp" class="timestamp-label">Last Position:</label>
              <div class="timestamp-input-group">
                <input type="text" id="bookmark-timestamp" class="timestamp-input" placeholder="0:00:00" pattern="[0-9]+:[0-5][0-9]:[0-5][0-9]" title="Format: H:MM:SS or HH:MM:SS" />
                <button id="clearTimestampBtn" class="clear-timestamp-btn" title="Clear">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div class="edit-actions">
            <div class="button-row">
               <button id="toggleCompleteBtn" class="secondary-btn flex-btn">
                  <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                  <span id="complete-btn-text">Complete</span>
               </button>
               <button id="editBookBtn" class="secondary-btn flex-btn">
                  <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                  Edit Details
               </button>
            </div>

            <button id="openDashboardFromEdit" class="primary-outline-btn">
              Open Library
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </button>

            <button id="deleteBookBtn" class="text-link-danger">
              Delete Book
            </button>
          </div>
        </div>

        <!-- Edit Mode -->
        <div id="edit-mode" class="hidden">
          <div class="book-card">
            <form id="edit-book-form">
              <div class="form-group">
                <label for="edit-title" class="form-label">Title</label>
                <input type="text" id="edit-title" class="form-input" required />
              </div>

              <div class="form-group">
                <label for="edit-author" class="form-label">Author</label>
                <input type="text" id="edit-author" class="form-input" />
              </div>

              <div class="form-group">
                <label for="edit-url" class="form-label">URL</label>
                <input type="url" id="edit-url" class="form-input" required />
              </div>

              <div class="form-group">
                <label for="edit-cover" class="form-label">Cover Image URL</label>
                <input type="url" id="edit-cover" class="form-input" placeholder="https://..." />
              </div>

              <div class="button-row">
                <button type="button" id="cancelEditBtn" class="secondary-btn flex-btn">
                  Cancel
                </button>
                <button type="submit" class="action-btn flex-btn">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                  Save Changes
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>

</html>
